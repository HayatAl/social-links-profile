<!doctype html>
<html lang="en">
  <head>
    <!-- Charset and viewport set for responsive and correct rendering -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap CSS CDN: library used for layout and utility classes -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Social links profile</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      * {
        font-family: "Inter", sans-serif;
        font-weight: 700;
        font-style: normal;
      }
      .attribution {
        font-size: 11px;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
      body {
        background: hsl(0, 16%, 85%);
      }
      a {
        width: 100%;
        background-color: hsl(0, 0%, 20%);
        text-align: center;
        margin: 5px 0;
        padding: 10px;
        border-radius: 10px;
        color: hsl(0, 0%, 100%);
        text-decoration: none;
        font-size: 14px;
      }
      a:hover,
      a :focus {
        color: hsl(0, 0%, 20%);
        background-color: hsl(75, 94%, 57%);
      }
      .mainContent {
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }
      .mainContent:hover {
        transform: scale(1.1);
        box-shadow: 10px 10px 50px white;
      }
    </style>
  </head>
  <body>
    <!-- Main container: center card vertically and horizontally -->
    <div
      class="row justify-content-center align-items-center min-vh-100 py-5"
      style="background: hsl(0, 0%, 8%)"
    >
      <div
        class="mainContent col-10 col-md-3 m-1 rounded py-4 justify-content-center row"
        style="background: hsl(0, 0%, 12%); height: auto"
      >
        <div class="head px-2" style="width: 85%; text-align: center">
          <img
            class="rounded-circle mb-4"
            style="width: 80px; height: 80px"
            src="./assets/images/avatar-jessica.jpeg"
            alt=""
          />
          <h3
            style="
              color: hsl(0, 0%, 100%);
              font-size: 28px;
              font-weight: 700;
              margin-bottom: 5px;
            "
          >
            Jessica Randall
          </h3>
          <h6
            style="
              font-size: 16px;
              color: hsl(75, 94%, 57%);
              font-weight: 600;
              margin-bottom: 30px;
            "
          >
            London, United Kingdom
          </h6>
          <p
            style="
              font-size: 12px;
              color: hsl(0, 0%, 100%);
              font-weight: 400;
              margin-bottom: 0;
            "
          >
            "Front-end developer and avid reader."
          </p>
        </div>
        <div class="link d-flex flex-column" style="width: 80%">
          <!-- Social media links section: add real URL in href for each -->
          <a href="">GitHub</a>
          <a href="">Frontend Mentor</a>
          <a href="">Linkedin</a>
          <a href="">Twitter</a>
          <a href="">instagram</a>
        </div>
      </div>
    </div>
  </body>
</html>
